<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa PH</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:#FAFBFC;color:#111827;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-container{width:100%;max-width:380px;padding:40px 24px;text-align:center}
.lock-icon{margin-bottom:32px;opacity:0.3}
.lock-icon svg{width:32px;height:32px;stroke:#111827;stroke-width:1.5;fill:none}
h1{font-size:1.6rem;font-weight:300;letter-spacing:6px;text-transform:uppercase;color:#111827;margin-bottom:6px}
.subtitle{font-size:0.75rem;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:#9CA3AF;margin-bottom:48px}
.input-group{position:relative;margin-bottom:24px}
.input-group input{width:100%;padding:14px 48px 14px 16px;background:#fff;border:1px solid #E5E7EB;border-radius:8px;color:#111827;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:400;outline:none;transition:border-color 0.2s}
.input-group input:focus{border-color:#2563EB}
.input-group input::placeholder{color:#9CA3AF}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;opacity:0.35;transition:opacity 0.2s}
.eye-btn:hover{opacity:0.6}
.eye-btn svg{width:20px;height:20px;stroke:#111827;stroke-width:1.5;fill:none}
.submit-btn{width:100%;padding:14px;background:#111827;color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
.submit-btn:hover{background:#1F2937;transform:translateY(-1px)}
.submit-btn:active{transform:translateY(0)}
.error-msg{color:#DC2626;font-size:0.8rem;margin-top:16px;opacity:0;transition:opacity 0.3s}
.error-msg.show{opacity:1}
.footer-text{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:#D1D5DB}
</style>
</head>
<body>
<div class="login-container">
<div class="lock-icon">
<svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
</div>
<h1>Casa PH</h1>
<p class="subtitle">Dashboard</p>
<form id="loginForm">
<div class="input-group">
<input type="password" id="pwd" placeholder="Contraseña" autocomplete="off" autofocus>
<button type="button" class="eye-btn" id="eyeBtn">
<svg viewBox="0 0 24 24" id="eyeIcon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
</button>
</div>
<button type="submit" class="submit-btn">Acceder</button>
</form>
<p class="error-msg" id="errorMsg">Contraseña incorrecta</p>
</div>
<div class="footer-text">AES-256</div>

const eyeBtn=document.getElementById('eyeBtn'),pwd=document.getElementById('pwd'),eyeIcon=document.getElementById('eyeIcon');
let visible=false;
eyeBtn.addEventListener('click',()=>{visible=!visible;pwd.type=visible?'text':'password';eyeIcon.innerHTML=visible?'<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>':'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'});
document.getElementById('loginForm').addEventListener('submit',async e=>{
e.preventDefault();
const p=pwd.value;if(!p)return;
try{
const d=JSON.parse(atob(PAYLOAD));
const salt=Uint8Array.from(atob(d.salt),c=>c.charCodeAt(0));
const iv=Uint8Array.from(atob(d.iv),c=>c.charCodeAt(0));
const ct=Uint8Array.from(atob(d.ct),c=>c.charCodeAt(0));
const enc=new TextEncoder();
const keyMaterial=await crypto.subtle.importKey('raw',enc.encode(p),'PBKDF2',false,['deriveKey']);
const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:d.iter,hash:'SHA-256'},keyMaterial,{name:'AES-CBC',length:256},false,['decrypt']);
const dec=await crypto.subtle.decrypt({name:'AES-CBC',iv},key,ct);
const txt=new TextDecoder().decode(dec);
const pad=txt.charCodeAt(txt.length-1);
const html=txt.substring(0,txt.length-pad);
document.open();document.write(html);document.close();
}catch(err){
document.getElementById('errorMsg').classList.add('show');
setTimeout(()=>document.getElementById('errorMsg').classList.remove('show'),2500);
}
});
</script>
