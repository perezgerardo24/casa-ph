<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Casa PH — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:#F2F2F7;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:#fff;border-radius:16px;padding:48px;box-shadow:0 4px 24px rgba(0,0,0,0.08);text-align:center;max-width:380px;width:90%}
.login-card h1{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:#86868B;margin-bottom:8px}
.login-card h2{font-size:28px;font-weight:700;color:#1D1D1F;margin-bottom:24px}
.login-card input{width:100%;padding:14px 16px;border:1.5px solid rgba(0,0,0,0.1);border-radius:10px;font-size:16px;font-family:inherit;outline:none;transition:border-color .2s}
.login-card input:focus{border-color:#0071E3}
.login-card button{width:100%;padding:14px;background:#0071E3;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin-top:12px;font-family:inherit;transition:background .2s}
.login-card button:hover{background:#0077ED}
.login-card .error{color:#FF3B30;font-size:13px;margin-top:8px;display:none}
.login-card .footer{color:#AEAEB2;font-size:11px;margin-top:20px}
</style>
</head>
<body>
<div class="login-card" id="loginCard">
<h1>Control de Obra</h1>
<h2>Casa PH</h2>
<form onsubmit="return tryDecrypt()">
<input type="password" id="pwd" placeholder="Contraseña" autofocus>
<button type="submit" id="btn">Acceder</button>
</form>
<div class="error" id="err">Contraseña incorrecta</div>
<div class="footer">AES-256 · v6.0</div>

async function tryDecrypt(){var p=document.getElementById("pwd").value;var btn=document.getElementById("btn");var err=document.getElementById("err");err.style.display="none";btn.textContent="Descifrando...";btn.disabled=true;try{var enc=new TextEncoder();var d=JSON.parse(atob(PAYLOAD));var salt=Uint8Array.from(atob(d.salt),function(c){return c.charCodeAt(0)});var iv=Uint8Array.from(atob(d.iv),function(c){return c.charCodeAt(0)});var ct=Uint8Array.from(atob(d.ct),function(c){return c.charCodeAt(0)});var km=await crypto.subtle.importKey("raw",enc.encode(p),"PBKDF2",false,["deriveKey"]);var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:d.iter,hash:"SHA-256"},km,{name:"AES-CBC",length:256},false,["decrypt"]);var dec=await crypto.subtle.decrypt({name:"AES-CBC",iv:iv},key,ct);var html=new TextDecoder().decode(dec);document.open();document.write(html);document.close();}catch(e){err.style.display="block";btn.textContent="Acceder";btn.disabled=false;}return false;}</script>
