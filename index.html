<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Casa PH — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    opacity: 0.035;
    pointer-events: none;
    z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  }

  .login {
    position: relative;
    z-index: 2;
    width: 90%;
    max-width: 360px;
    text-align: center;
  }

  .login h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 42px;
    font-weight: 600;
    color: #1a1a2e;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 6px;
  }

  .login .sub {
    font-size: 13px;
    color: #6b6b80;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .input-group {
    position: relative;
    margin-bottom: 16px;
  }

  .input-group input {
    width: 100%;
    padding: 16px 48px 16px 16px;
    background: #ffffff;
    border: 1px solid #e8e8ed;
    border-radius: 8px;
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-size: 16px;
    color: #1a1a2e;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  .input-group input:focus {
    border-color: #2d5a3d;
    box-shadow: 0 0 0 3px rgba(45,90,61,0.08);
  }

  .input-group input::placeholder {
    color: #9c9cad;
    font-weight: 300;
  }

  .input-group .toggle {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #9c9cad;
    font-size: 14px;
    padding: 4px;
    transition: color 0.2s;
  }
  .input-group .toggle:hover { color: #6b6b80; }

  .btn {
    width: 100%;
    padding: 15px;
    background: #1a1a2e;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn:hover { background: #2a2a42; }
  .btn:active { transform: scale(0.98); }

  .error {
    color: #9b2c2c;
    font-size: 13px;
    margin-top: 14px;
    display: none;
  }

  .lock-note {
    margin-top: 32px;
    font-size: 11px;
    color: #9c9cad;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .lock-note svg { opacity: 0.5; }
</style>
</head>
<body>

<div class="login" id="loginCard">
  <h1>Casa PH</h1>
  <p class="sub">Control de obra</p>
  <form id="loginForm">
    <div class="input-group">
      <input type="password" id="pwd" placeholder="Contraseña" autocomplete="off" autofocus>
      <button type="button" class="toggle" onclick="togglePwd()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <button type="submit" class="btn">Entrar</button>
  </form>
  <div class="error" id="err">Contraseña incorrecta</div>
  <p class="lock-note">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Cifrado AES-256
  </p>
</div>

function togglePwd() {
  const inp = document.getElementById('pwd');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

async function deriveKey(password, salt, iterations) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits({name: 'PBKDF2', salt: salt, iterations: iterations, hash: 'SHA-256'}, keyMaterial, 256);
  return await crypto.subtle.importKey('raw', bits, {name: 'AES-CBC'}, false, ['decrypt']);
}

function b64ToArr(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function decrypt(password) {
  try {
    const data = JSON.parse(atob(PAYLOAD));
    const salt = b64ToArr(data.salt);
    const iv = b64ToArr(data.iv);
    const ct = b64ToArr(data.ct);
    const key = await deriveKey(password, salt, data.iter);
    const decrypted = await crypto.subtle.decrypt({name: 'AES-CBC', iv: iv}, key, ct);
    const decoder = new TextDecoder();
    return decoder.decode(decrypted);
  } catch(e) {
    return null;
  }
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pwd = document.getElementById('pwd').value;
  if (!pwd) return;
  
  const btn = document.querySelector('.btn');
  btn.textContent = 'Descifrando...';
  btn.disabled = true;
  
  await new Promise(r => setTimeout(r, 100));
  
  const html = await decrypt(pwd);
  if (html) {
    const clean = html.replace(/[\x00-\x0f]+$/g, '').trim();
    document.open();
    document.write(clean);
    document.close();
  } else {
    document.getElementById('err').style.display = 'block';
    btn.textContent = 'ENTRAR';
    btn.disabled = false;
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
});
</script>
