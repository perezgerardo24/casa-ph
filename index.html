<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa PH</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:#F2F2F7;color:#1D1D1F;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.login-container{width:100%;max-width:360px;padding:40px 24px;text-align:center}
.lock-icon{margin-bottom:36px;opacity:0.2}
.lock-icon svg{width:28px;height:28px;stroke:#1D1D1F;stroke-width:1.5;fill:none}
h1{font-size:1.5rem;font-weight:300;letter-spacing:8px;text-transform:uppercase;color:#1D1D1F;margin-bottom:4px}
.subtitle{font-size:0.65rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#AEAEB2;margin-bottom:44px}
.input-group{position:relative;margin-bottom:20px}
.input-group input{width:100%;padding:13px 46px 13px 16px;background:#FFFFFF;border:1px solid rgba(0,0,0,0.08);border-radius:10px;color:#1D1D1F;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:400;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
.input-group input:focus{border-color:#0071E3;box-shadow:0 0 0 3px rgba(0,113,227,0.12)}
.input-group input::placeholder{color:#AEAEB2}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;opacity:0.25;transition:opacity 0.2s}
.eye-btn:hover{opacity:0.5}
.eye-btn svg{width:18px;height:18px;stroke:#1D1D1F;stroke-width:1.5;fill:none}
.submit-btn{width:100%;padding:13px;background:#0071E3;color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
.submit-btn:hover{background:#0077ED;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,113,227,0.25)}
.submit-btn:active{transform:translateY(0);box-shadow:none}
.error-msg{color:#FF3B30;font-size:0.78rem;margin-top:14px;opacity:0;transition:opacity 0.3s;min-height:22px}
.error-msg.show{opacity:1}
.status-msg{font-size:0.72rem;color:#AEAEB2;margin-top:12px;min-height:20px}
.footer-text{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:0.58rem;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:#D1D1D6}
.version{position:fixed;bottom:20px;right:20px;font-size:0.55rem;font-weight:500;letter-spacing:1.5px;color:#D1D1D6}
#dashFrame{position:fixed;top:0;left:0;width:100vw;height:100vh;border:none;display:none;z-index:9999}
</style>
</head>
<body>
<div class="login-container" id="loginScreen">
<div class="lock-icon">
<svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
</div>
<h1>Casa PH</h1>
<p class="subtitle">Dashboard</p>
<form id="loginForm">
<div class="input-group">
<input type="password" id="pwd" placeholder="Contraseña" autocomplete="off" autofocus>
<button type="button" class="eye-btn" id="eyeBtn">
<svg viewBox="0 0 24 24" id="eyeIcon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
</button>
</div>
<button type="submit" class="submit-btn">Acceder</button>
</form>
<p class="error-msg" id="errorMsg">Contraseña incorrecta</p>
<p class="status-msg" id="statusMsg"></p>
</div>
<iframe id="dashFrame"></iframe>
<div class="footer-text">AES-256</div>

const eyeBtn=document.getElementById('eyeBtn'),pwd=document.getElementById('pwd'),
      eyeIcon=document.getElementById('eyeIcon'),statusMsg=document.getElementById('statusMsg');
let visible=false;
eyeBtn.addEventListener('click',()=>{visible=!visible;pwd.type=visible?'text':'password';
eyeIcon.innerHTML=visible?'<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>':'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'});

document.getElementById('loginForm').addEventListener('submit',async e=>{
e.preventDefault();
const p=pwd.value;if(!p)return;
try{
  statusMsg.textContent='Descifrando...';

  const d=JSON.parse(atob(PAYLOAD));
  const salt=Uint8Array.from(atob(d.salt),c=>c.charCodeAt(0));
  const iv=Uint8Array.from(atob(d.iv),c=>c.charCodeAt(0));
  const ct=Uint8Array.from(atob(d.ct),c=>c.charCodeAt(0));
  const enc=new TextEncoder();
  const keyMaterial=await crypto.subtle.importKey('raw',enc.encode(p),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:d.iter,hash:'SHA-256'},keyMaterial,{name:'AES-CBC',length:256},false,['decrypt']);
  const dec=await crypto.subtle.decrypt({name:'AES-CBC',iv},key,ct);
  const txt=new TextDecoder().decode(dec);
  const pad=txt.charCodeAt(txt.length-1);
  const html=txt.substring(0,txt.length-pad);

  statusMsg.textContent='Cargando dashboard...';

  // Use iframe srcdoc — proper document context, scripts load normally
  const frame=document.getElementById('dashFrame');
  frame.srcdoc=html;
  frame.style.display='block';
  document.getElementById('loginScreen').style.display='none';
  document.querySelector('.footer-text').style.display='none';
  document.querySelector('.version').style.display='none';

}catch(err){
  statusMsg.textContent='';
  document.getElementById('errorMsg').classList.add('show');
  setTimeout(()=>document.getElementById('errorMsg').classList.remove('show'),2500);
}
});
</script>
